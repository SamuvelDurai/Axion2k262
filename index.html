<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXION 2K26 | AI-oT Fusion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }
        h1, h2, h3, .font-heading {
            font-family: 'Space Grotesk', sans-serif;
        }
        .font-logo {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.15em;
        }
        .font-tech {
            font-family: 'Rajdhani', sans-serif;
        }
        .glass {
            background: rgba(11, 14, 20, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        /* AXION LOGO STYLING */
        .axion-brand {
            position: relative;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            background: linear-gradient(to right, #00f2ff, #bc13fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
        }
        
        .axion-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 3px solid #00f2ff;
            padding-left: 0.75rem;
            position: relative;
        }

        .axion-container::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 40%;
            height: 2px;
            background: #bc13fe;
        }

        /* AI-oT Fusion Styling */
        .fusion-title {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            position: relative;
        }
        
        .fusion-gradient {
            background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.5) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .neon-border-cyan {
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            border: 1px solid rgba(0, 242, 255, 0.5);
        }
        .neon-border-purple {
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
            border: 1px solid rgba(188, 19, 254, 0.5);
        }
        
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: flex;
            width: max-content;
            animation: marquee 30s linear infinite;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0e14;
        }
        ::-webkit-scrollbar-thumb {
            background: #1f2937;
            border-radius: 10px;
        }
    </style>
